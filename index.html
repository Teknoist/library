<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Exocad Library Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0d0d11;--bg2:#13131a;--bg3:#1a1a23;--card:#1a1a23;--card-hover:#21212d;
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.13);
  --accent:#7c6bf0;--accent2:#a78fff;--accent-glow:rgba(124,107,240,0.18);
  --text:#eaeaf4;--text2:#8888a8;--text3:#4a4a68;
  --green:#3ecf8e;--orange:#f0a050;--blue:#60b4f0;--red:#f06060;--yellow:#f0c850;--teal:#3eb4cf;
  --radius:14px;--radius-sm:9px;--radius-xs:6px;--trans:0.16s ease;
  --shadow:0 4px 24px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#f0f0f6;--bg2:#fafaff;--bg3:#e8e8f2;--card:#ffffff;--card-hover:#f4f4fc;
  --border:rgba(0,0,0,0.07);--border-hover:rgba(0,0,0,0.14);
  --text:#18182e;--text2:#55557a;--text3:#9595b8;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hdr{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:14px;height:60px}
.logo{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:8px}
.logo-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:0.05em}

/* ── SEARCH ── */
.sw{flex:1;position:relative;min-width:0}
.sw input{
  width:100%;height:40px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:13.5px;
  padding:0 80px 0 40px;outline:none;transition:border-color var(--trans),box-shadow var(--trans);font-family:inherit;
}
.sw input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.sw input::placeholder{color:var(--text3)}
.sw-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.sw-kbd{position:absolute;right:38px;top:50%;transform:translateY(-50%);background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:10px;padding:1px 5px;color:var(--text3);pointer-events:none}
.sw-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;line-height:1;display:none;padding:3px}
.sw-clr.show{display:block}
.sw-clr.show ~ .sw-kbd{display:none}

/* ── HEADER BUTTONS ── */
.hbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all var(--trans);flex-shrink:0}
.hbtn:hover{background:var(--card-hover);color:var(--text);border-color:var(--border-hover)}

/* ── STATS BAR ── */
.stats-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem}
.stats-inner{max-width:1000px;margin:0 auto;display:flex;gap:20px;padding:8px 0;overflow-x:auto;scrollbar-width:none}
.stats-inner::-webkit-scrollbar{display:none}
.stat{display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.stat-dot{width:7px;height:7px;border-radius:50%}
.stat-label{font-size:11.5px;color:var(--text2)}
.stat-val{font-size:12px;font-weight:600;color:var(--text)}

/* ── TABS ── */
.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:60px;z-index:99}
.tabs{max-width:1000px;margin:0 auto;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all var(--trans);user-select:none;flex-shrink:0;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-badge{background:var(--bg3);color:var(--text3);font-size:10.5px;padding:1px 6px;border-radius:10px;font-weight:600;transition:all var(--trans)}
.tab.active .tab-badge{background:rgba(124,107,240,0.2);color:var(--accent2)}

/* ── TOOLBAR ── */
.toolbar{max-width:1000px;margin:0 auto;padding:14px 1.5rem 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{padding:5px 13px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all var(--trans);white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--border-hover);color:var(--text)}
.chip.active{background:rgba(124,107,240,0.15);border-color:rgba(124,107,240,0.5);color:var(--accent2)}
.sel{margin-left:auto;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;outline:none;font-family:inherit;transition:border-color var(--trans)}
.sel:focus{border-color:var(--accent)}

/* ── INFO ROW ── */
.info{max-width:1000px;margin:0 auto;padding:10px 1.5rem 0;font-size:12px;color:var(--text3)}
.info b{color:var(--text2)}

/* ── GRID ── */
.gwrap{max-width:1000px;margin:0 auto;padding:12px 1.5rem 3rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}

/* ── LIBRARY CARD ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:9px;
  transition:all var(--trans);position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,var(--accent-glow),transparent 60%);
  transition:opacity var(--trans);pointer-events:none;
}
.card:hover{background:var(--card-hover);border-color:var(--border-hover);transform:translateY(-1px);box-shadow:var(--shadow)}
.card:hover::before{opacity:1}
.card-top{display:flex;align-items:flex-start;gap:9px}
.card-ico{
  width:34px;height:34px;border-radius:var(--radius-sm);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  background:rgba(62,207,142,0.1);color:var(--green);margin-top:1px;
}
.card-name{font-size:13px;font-weight:500;line-height:1.45;color:var(--text);word-break:break-word;overflow-wrap:break-word;flex:1}
.card-actions{display:flex;gap:6px;align-items:center}
.btn-dl{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  background:rgba(124,107,240,0.1);border:1px solid rgba(124,107,240,0.22);
  color:var(--accent2);border-radius:var(--radius-sm);padding:7px 10px;
  font-size:12px;font-weight:500;cursor:pointer;transition:all var(--trans);font-family:inherit;
}
.btn-dl:hover{background:rgba(124,107,240,0.22);border-color:var(--accent)}
.btn-dl:disabled{opacity:0.3;cursor:not-allowed}
.bsm{
  width:31px;height:31px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all var(--trans);font-size:13px;flex-shrink:0;
}
.bsm:hover{background:var(--card-hover);color:var(--text);border-color:var(--border-hover)}
.bsm.fav-on{color:var(--red);border-color:rgba(240,96,96,0.3);background:rgba(240,96,96,0.08)}

/* ── EMPTY ── */
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--text3)}
.empty-ico{font-size:40px;margin-bottom:14px;opacity:0.35}
.empty p{font-size:14px;margin-top:4px}
.empty h3{font-size:15px;color:var(--text2);font-weight:500}

/* ── SOFTWARE TAB ── */
.swrap{max-width:1000px;margin:0 auto;padding:16px 1.5rem 3rem}
.sgroup{margin-bottom:2rem}
.sgroup-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text3);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.sgroup-title .stcount{font-weight:500;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text3)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.scard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 13px;display:flex;align-items:flex-start;gap:10px;
  transition:all var(--trans);
}
.scard:hover{background:var(--card-hover);border-color:var(--border-hover)}
.scard-ico{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:1px}
.scard-info{flex:1;min-width:0}
.scard-name{font-size:12.5px;font-weight:500;color:var(--text);word-break:break-word;overflow-wrap:break-word;line-height:1.4}
.scard-sub{font-size:11px;color:var(--text3);margin-top:3px}
.scard-acts{display:flex;gap:5px;flex-shrink:0;margin-top:1px}
.sdl{
  width:28px;height:28px;border-radius:var(--radius-xs);
  background:rgba(124,107,240,0.1);border:1px solid rgba(124,107,240,0.2);
  color:var(--accent2);display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;transition:all var(--trans);text-decoration:none;
}
.sdl:hover{background:rgba(124,107,240,0.22);border-color:var(--accent)}
.scopy{
  width:28px;height:28px;border-radius:var(--radius-xs);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text3);display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;transition:all var(--trans);
}
.scopy:hover{background:var(--card-hover);color:var(--text)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 20px;font-size:13px;color:var(--text);box-shadow:var(--shadow);
  transition:transform 0.22s ease,opacity 0.22s ease;opacity:0;z-index:9999;
  white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── SCROLL TOP ── */
.stbtn{
  position:fixed;bottom:28px;right:24px;width:40px;height:40px;
  background:var(--bg2);border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--text2);font-size:16px;transition:all var(--trans);box-shadow:var(--shadow);
  opacity:0;pointer-events:none;z-index:50;
}
.stbtn.show{opacity:1;pointer-events:all}
.stbtn:hover{background:var(--card-hover);color:var(--text)}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--card-hover) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:110px}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .logo-badge,.sw-kbd{display:none}
  .tab{padding:10px 12px;font-size:12px}
  .grid{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:1fr}
  .stats-bar{display:none}
  header{padding:0 1rem}
  .tabs-bar,.toolbar,.gwrap,.swrap,.info{padding-left:1rem;padding-right:1rem}
}
@media(max-width:400px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr">
    <div class="logo">
      <span>🦷 Exocad Hub</span>
      <span class="logo-badge">BETA</span>
    </div>
    <div class="sw">
      <span class="sw-ico">🔍</span>
      <input id="si" placeholder="Search anything…" autocomplete="off" spellcheck="false"/>
      <span class="sw-kbd">/</span>
      <button class="sw-clr" id="sc">×</button>
    </div>
    <button class="hbtn" id="themeBtn" title="Toggle theme">🌙</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat"><div class="stat-dot" style="background:var(--green)"></div><span class="stat-label">Libraries</span><span class="stat-val" id="st-libs">–</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--accent)"></div><span class="stat-label">Software Builds</span><span class="stat-val" id="st-soft">–</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--red)"></div><span class="stat-label">Favorites</span><span class="stat-val" id="st-favs">0</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--yellow)"></div><span class="stat-label">Categories</span><span class="stat-val" id="st-cats">8</span></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <div class="tabs">
    <div class="tab active" data-tab="libs">📦 Libraries <span class="tab-badge" id="badge-libs">–</span></div>
    <div class="tab" data-tab="software">💿 Software <span class="tab-badge" id="badge-soft">–</span></div>
    <div class="tab" data-tab="favs">⭐ Favorites <span class="tab-badge" id="badge-favs">0</span></div>
  </div>
</div>

<!-- ── LIBRARIES TAB ── -->
<div id="tabLibs">
  <div class="toolbar">
    <select class="sel" id="sortSel">
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>
  <div class="info" id="libsInfo"></div>
  <div class="gwrap"><div class="grid" id="libsGrid"></div></div>
</div>

<!-- ── SOFTWARE TAB ── -->
<div id="tabSoftware" style="display:none">
  <div class="toolbar">
    <div class="chip scat active" data-scat="all">All</div>
    <div class="chip scat" data-scat="dentalcad">🦷 DentalCAD</div>
    <div class="chip scat" data-scat="exoplan">🔬 exoplan</div>
    <div class="chip scat" data-scat="chairside">🪑 ChairsideCAD</div>
    <div class="chip scat" data-scat="partialcad">🧩 PartialCAD</div>
    <div class="chip scat" data-scat="framework">⚙️ Framework</div>
    <div class="chip scat" data-scat="implant_editor">🔩 Implant Editor</div>
    <div class="chip scat" data-scat="ToothModelEditor">🪥 Tooth Editor</div>
    <div class="chip scat" data-scat="addon">🔌 exoCAM</div>
  </div>
  <div class="info" id="softInfo"></div>
  <div class="swrap" id="softWrap"></div>
</div>

<!-- ── FAVORITES TAB ── -->
<div id="tabFavs" style="display:none">
  <div class="info" id="favsInfo"></div>
  <div class="gwrap"><div class="grid" id="favsGrid"></div></div>
</div>

<div class="toast" id="toast"></div>
<button class="stbtn" id="scrollTop">↑</button>

<script>
const FILES_URL = 'files.json';
const HEX_URL   = 'hex.json';

let allFiles = [], hexData = {};
let favs = JSON.parse(localStorage.getItem('exo_favs') || '[]');
let currentSort = 'az', currentTab = 'libs', currentSCat = 'all';
let lightMode = localStorage.getItem('exo_theme') === 'light';

if (lightMode) document.documentElement.setAttribute('data-theme','light');
document.getElementById('themeBtn').textContent = lightMode ? '☀️' : '🌙';

/* ── TOAST ── */
let _tid;
function toast(msg, icon='✓') {
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${icon}</span>${msg}`;
  t.classList.add('show');
  clearTimeout(_tid);
  _tid = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── COPY ── */
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Link copied to clipboard','📋'));
}

/* ── FAVORITES ── */
function toggleFav(name) {
  const i = favs.indexOf(name);
  if (i === -1) { favs.push(name); toast('Added to favorites','⭐'); }
  else { favs.splice(i,1); toast('Removed from favorites','🗑️'); }
  localStorage.setItem('exo_favs', JSON.stringify(favs));
  updateAllBadges();
  if (currentTab === 'libs') renderLibs();
  if (currentTab === 'favs') renderFavs();
}

/* ── NORMALIZE ── */
function norm(t) {
  if (!t) return '';
  const m={'İ':'i','I':'i','ı':'i','Ş':'s','ş':'s','Ğ':'g','ğ':'g','Ü':'u','ü':'u','Ö':'o','ö':'o','Ç':'c','ç':'c'};
  return t.replace(/[İIıŞşĞğÜüÖöÇç]/g,c=>m[c]||c).toLowerCase();
}

/* ── DECODE B64 ── */
function decodeB64(b64) {
  try {
    const s = b64.replace(/-/g,'+').replace(/_/g,'/');
    const p = s + '==='.slice((s.length+3)%4);
    return decodeURIComponent(escape(atob(p)));
  } catch(e) {
    try { return atob(b64); } catch(e2) { return ''; }
  }
}

/* ── MAKE LIBRARY CARD ── */
function makeCard(file) {
  const isFav = favs.includes(file.name);
  const hasUrl = file.download_url && file.download_url.length > 30;
  const safeUrl = (file.download_url||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const safeName = file.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `
    <div class="card-top">
      <div class="card-ico">📦</div>
      <div class="card-name">${escHtml(file.name)}</div>
    </div>
    <div class="card-actions">
      <button class="btn-dl" ${hasUrl?'':'disabled'} onclick="window.open('${safeUrl}','_blank')">⬇ Download</button>
      <button class="bsm" title="Copy link" onclick="copyText('${safeUrl}')">📋</button>
      <button class="bsm ${isFav?'fav-on':''}" title="${isFav?'Remove favorite':'Add to favorites'}" onclick="toggleFav('${safeName}')">${isFav?'⭐':'☆'}</button>
    </div>`;
  return d;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── RENDER LIBRARIES ── */
function getFilteredLibs() {
  const q = norm(document.getElementById('si').value);
  let res = allFiles.filter(f => !q || q==='*' || norm(f.name).includes(q));
  res.sort((a,b) => currentSort==='za' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  return res;
}

function renderLibs() {
  const grid = document.getElementById('libsGrid');
  const res  = getFilteredLibs();
  document.getElementById('libsInfo').innerHTML = `Showing <b>${res.length}</b> of <b>${allFiles.length}</b> libraries`;
  grid.innerHTML = '';
  if (!res.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><h3>No results</h3><p>Try a different search term</p></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  res.forEach(f => frag.appendChild(makeCard(f)));
  grid.appendChild(frag);
}

function renderFavs() {
  const grid = document.getElementById('favsGrid');
  const q = norm(document.getElementById('si').value);
  const res = allFiles.filter(f => favs.includes(f.name) && (!q||q==='*'||norm(f.name).includes(q)));
  document.getElementById('favsInfo').innerHTML = `<b>${res.length}</b> favorite${res.length!==1?'s':''}`;
  grid.innerHTML = '';
  if (!res.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-ico">⭐</div><h3>No favorites yet</h3><p>Click ☆ on any library card to save it here</p></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  res.forEach(f => frag.appendChild(makeCard(f)));
  grid.appendChild(frag);
}

/* ── SOFTWARE META ── */
const SMETA = {
  dentalcad:        {label:'DentalCAD',       icon:'🦷', bg:'rgba(62,207,142,0.12)',  color:'#3ecf8e'},
  exoplan:          {label:'exoplan',          icon:'🔬', bg:'rgba(124,107,240,0.12)', color:'#a78fff'},
  chairside:        {label:'ChairsideCAD',     icon:'🪑', bg:'rgba(96,180,240,0.12)',  color:'#60b4f0'},
  partialcad:       {label:'PartialCAD',       icon:'🧩', bg:'rgba(240,160,80,0.12)',  color:'#f0a050'},
  framework:        {label:'Framework',        icon:'⚙️',  bg:'rgba(160,160,180,0.1)', color:'#9090a8'},
  implant_editor:   {label:'Implant Editor',   icon:'🔩', bg:'rgba(240,96,96,0.12)',   color:'#f06060'},
  ToothModelEditor: {label:'Tooth Model Editor',icon:'🪥',bg:'rgba(240,200,80,0.12)', color:'#f0c850'},
  addon:            {label:'exoCAM Addon',     icon:'🔌', bg:'rgba(62,180,207,0.12)',  color:'#3eb4cf'},
};
const SORDER = ['dentalcad','exoplan','chairside','partialcad','framework','implant_editor','ToothModelEditor','addon'];

function cleanName(n) { return n.replace(/\.7z|\.zip|\.exe/gi,'').replace(/_/g,' ').trim(); }
function getDate(n)   { const m=n.match(/(\d{4})[.\s-](\d{2})[.\s-](\d{2})/); return m?`${m[1]}-${m[2]}-${m[3]}`:''; }

function renderSoftware() {
  const wrap = document.getElementById('softWrap');
  wrap.innerHTML = '';
  const q = norm(document.getElementById('si').value);
  let shown = 0;

  SORDER.forEach(key => {
    const items = hexData[key];
    if (!items||!items.length) return;
    if (currentSCat!=='all' && currentSCat!==key) return;
    const meta = SMETA[key]||{label:key,icon:'📦',bg:'rgba(124,107,240,0.12)',color:'#a78fff'};
    const filtered = items.filter(it => !q||q==='*'||norm(it.Name).includes(q));
    if (!filtered.length) return;
    shown += filtered.length;

    const sec  = document.createElement('div'); sec.className = 'sgroup';
    const grid = document.createElement('div'); grid.className = 'sgrid';

    filtered.forEach(item => {
      const url  = item._decodedUrl || '';
      const name = cleanName(item.Name);
      const date = getDate(item.Name);
      const safeUrl = url.replace(/'/g,"\\'");
      const c = document.createElement('div'); c.className = 'scard';
      c.innerHTML = `
        <div class="scard-ico" style="background:${meta.bg}"><span>${meta.icon}</span></div>
        <div class="scard-info">
          <div class="scard-name">${escHtml(name)}</div>
          ${date?`<div class="scard-sub">📅 ${date}</div>`:''}
        </div>
        <div class="scard-acts">
          <button class="scopy" title="Copy link" onclick="copyText('${safeUrl}')">📋</button>
          <a class="sdl" href="${url}" target="_blank" rel="noopener" title="Download">⬇</a>
        </div>`;
      grid.appendChild(c);
    });

    sec.innerHTML = `<div class="sgroup-title">${meta.icon} ${meta.label} <span class="stcount">(${filtered.length})</span></div>`;
    sec.appendChild(grid);
    wrap.appendChild(sec);
  });

  const total = SORDER.reduce((a,k)=>a+(hexData[k]?.length||0),0);
  document.getElementById('softInfo').innerHTML = `Showing <b>${shown}</b> of <b>${total}</b> builds`;
  if (!shown) wrap.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><h3>No results</h3><p>Try a different search term</p></div>';
}

/* ── BADGES & STATS ── */
function updateAllBadges() {
  const libCount  = allFiles.length;
  const softTotal = SORDER.reduce((a,k)=>a+(hexData[k]?.length||0),0);
  const favCount  = favs.length;

  document.getElementById('badge-libs').textContent  = libCount  || '–';
  document.getElementById('badge-soft').textContent  = softTotal || '–';
  document.getElementById('badge-favs').textContent  = favCount;
  document.getElementById('st-libs').textContent     = libCount  || '–';
  document.getElementById('st-soft').textContent     = softTotal || '–';
  document.getElementById('st-favs').textContent     = favCount;
}

/* ── TAB SWITCH ── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.getElementById('tabLibs').style.display      = tab==='libs'     ? '' : 'none';
  document.getElementById('tabSoftware').style.display  = tab==='software' ? '' : 'none';
  document.getElementById('tabFavs').style.display      = tab==='favs'     ? '' : 'none';
  if (tab==='libs')     renderLibs();
  if (tab==='software') renderSoftware();
  if (tab==='favs')     renderFavs();
}

/* ── SKELETON LOADER ── */
function showSkeletons(gridId, count=8) {
  const g = document.getElementById(gridId);
  g.innerHTML = Array(count).fill('<div class="skeleton skel-card"></div>').join('');
}

/* ── EVENTS ── */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

document.querySelectorAll('.scat').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.scat').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentSCat = chip.dataset.scat;
    renderSoftware();
  });
});

const si = document.getElementById('si');
const sc = document.getElementById('sc');
si.addEventListener('input', () => {
  sc.classList.toggle('show', si.value.length>0);
  if (currentTab==='libs')     renderLibs();
  else if (currentTab==='software') renderSoftware();
  else if (currentTab==='favs')     renderFavs();
});
sc.addEventListener('click', () => { si.value=''; sc.classList.remove('show'); renderLibs(); si.focus(); });

document.getElementById('sortSel').addEventListener('change', e => { currentSort=e.target.value; renderLibs(); });

document.getElementById('themeBtn').addEventListener('click', () => {
  lightMode = !lightMode;
  document.documentElement.setAttribute('data-theme', lightMode?'light':'');
  document.getElementById('themeBtn').textContent = lightMode?'☀️':'🌙';
  localStorage.setItem('exo_theme', lightMode?'light':'dark');
});

window.addEventListener('keydown', e => {
  if (e.key==='/' && document.activeElement!==si) { e.preventDefault(); si.focus(); si.select(); }
  if (e.key==='Escape') { si.value=''; sc.classList.remove('show'); renderLibs(); si.blur(); }
});

const stbtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => stbtn.classList.toggle('show', scrollY>500), {passive:true});
stbtn.addEventListener('click', () => scrollTo({top:0,behavior:'smooth'}));

/* ── LOAD DATA ── */
async function loadFiles() {
  showSkeletons('libsGrid', 12);
  try {
    const r = await fetch(FILES_URL + '?v=' + Date.now());
    allFiles = await r.json();
  } catch(e) {
    document.getElementById('libsGrid').innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><h3>Load failed</h3><p>Could not load files.json</p></div>';
  }
  updateAllBadges();
  renderLibs();
}

async function loadHex() {
  try {
    const r = await fetch(HEX_URL + '?v=' + Date.now());
    const raw = await r.json();
    Object.keys(raw).forEach(cat => {
      if (Array.isArray(raw[cat])) raw[cat].forEach(item => { item._decodedUrl = decodeB64(item.Url); });
    });
    hexData = raw;
  } catch(e) {
    console.warn('hex.json load failed', e);
  }
  updateAllBadges(); // ← badge güncelleniyor yüklendikten sonra
}

// Her iki fetch paralel çalışsın, bitince badge güncelle
Promise.all([loadFiles(), loadHex()]).then(updateAllBadges);
</script>
</body>
